        // Load saved state from LocalStorage or initialize
        let savedState = JSON.parse(localStorage.getItem('portswigger_state')) || {};

        // Merge user's initial copy-pasted 'status' into savedState if it doesn't exist
        rawData.forEach(category => {
            category.labs.forEach(lab => {
                if(lab.status === "Solved" && savedState[lab.name] === undefined) {
                    savedState[lab.name] = true;
                } else if (savedState[lab.name] === undefined) {
                    savedState[lab.name] = false;
                }
            });
        });
        saveState();

        function saveState() {
            localStorage.setItem('portswigger_state', JSON.stringify(savedState));
        }

        function toggleLab(labName, isChecked) {
            savedState[labName] = isChecked;
            saveState();
            renderList();
        }

        function renderList() {
            const container = document.getElementById('lab-container');
            const hideNo = document.getElementById('filter-hide-no').checked;
            const hideSolved = document.getElementById('filter-hide-solved').checked;
            
            container.innerHTML = '';
            
            let totalMustDo = 0;
            let totalSolved = 0;

            rawData.forEach(category => {
                let categoryHtml = `<div class="mb-4"><h2 class="text-xl font-bold border-b-2 border-gray-200 pb-1 mb-3 text-gray-700">${category.topic}</h2><div class="space-y-2">`;
                let visibleLabsCount = 0;

                category.labs.forEach(lab => {
                    const isSolved = savedState[lab.name];
                    const isMustDo = lab.do === "yes";

                    if(isMustDo) {
                        totalMustDo++;
                        if(isSolved) totalSolved++;
                    }

                    // Apply UI Filters
                    if (hideNo && !isMustDo) return;
                    if (hideSolved && isSolved) return;

                    visibleLabsCount++;

                    const badgeColor = lab.level === "APPRENTICE" ? "bg-green-100 text-green-800" : 
                                       lab.level === "PRACTITIONER" ? "bg-blue-100 text-blue-800" : "bg-red-100 text-red-800";
                    
                    const cardClass = isMustDo ? 'do-yes' : 'do-no';
                    const textClass = isSolved ? 'solved-item' : '';

                    categoryHtml += `
                        <div class="flex items-center p-3 rounded shadow-sm border ${cardClass}">
                            <input type="checkbox" class="h-5 w-5 text-blue-600 rounded mr-4 cursor-pointer" 
                                ${isSolved ? 'checked' : ''} 
                                onchange="toggleLab('${lab.name.replace(/'/g, "\\'")}', this.checked)">
                            
                            <div class="flex-1 ${textClass}">
                                <div class="text-sm font-semibold">${lab.name}</div>
                                <div class="text-xs mt-1">
                                    <span class="px-2 py-0.5 rounded font-medium ${badgeColor}">${lab.level}</span>
                                    ${!isMustDo ? '<span class="ml-2 px-2 py-0.5 rounded font-medium bg-red-200 text-red-800">SKIP / TIME SINK</span>' : ''}
                                </div>
                            </div>
                        </div>
                    `;
                });

                categoryHtml += `</div></div>`;
                
                // Only render category if there are visible labs inside it
                if(visibleLabsCount > 0) {
                    container.innerHTML += categoryHtml;
                }
            });

            // Update stats
            document.getElementById('stat-total').innerText = totalMustDo;
            document.getElementById('stat-solved').innerText = totalSolved;
            document.getElementById('stat-remaining').innerText = totalMustDo - totalSolved;
        }

        // Initial render
        renderList();
    </script>
